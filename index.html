<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Carteira & Operação · Make Buzz</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#16203A;--muted:#5A6478;--muted-2:#828B9C;--line:#D6DDE8;--line-soft:#E4E9F1;
  --paper:#EAEEF4;--card:#FFFFFF;
  --navy:#284888;--navy-deep:#1E3462;--navy-700:#223C6E;--navy-soft:#EDF1F8;
  --late:#9A392C;--late-bg:#F4E4E1;--wait:#8F5D14;--wait-bg:#F5EAD4;--done:#2C6E4C;--done-bg:#E1EEE7;
  --shadow-1:0 1px 2px rgba(22,32,58,.06),0 1px 1px rgba(22,32,58,.05);
  --shadow-2:0 10px 30px rgba(22,32,58,.15),0 2px 6px rgba(22,32,58,.08);
  --sans:'Archivo',system-ui,-apple-system,'Segoe UI',sans-serif;
  --serif:'Newsreader',Georgia,'Times New Roman',serif;
  --mono:'IBM Plex Mono',ui-monospace,'SF Mono',Menlo,Consolas,monospace;
}
*{box-sizing:border-box}
html,body{margin:0}
body{background:var(--paper);color:var(--ink);font-family:var(--sans);line-height:1.45;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
::selection{background:#C9D6EC}

.site-head{background:var(--card);border-bottom:2px solid var(--navy);position:sticky;top:0;z-index:40}
.head-inner{max-width:960px;margin:0 auto;padding:14px 20px 12px;display:flex;align-items:center;gap:18px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:14px;min-width:0}
.brand img{height:46px;width:auto;display:block}
.brand-titles{min-width:0}
.eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.13em;text-transform:uppercase;color:var(--muted-2);font-weight:500}
.brand h1{font-family:var(--sans);font-weight:800;font-size:21px;line-height:1.05;margin:2px 0 0;letter-spacing:-.015em}
.radar{display:flex;align-items:center;gap:8px;margin-left:auto}
.r{display:flex;flex-direction:column;align-items:center;min-width:60px;padding:6px 9px;border:1px solid var(--line);border-radius:11px;background:var(--card)}
.r-n{font-family:var(--mono);font-size:18px;font-weight:600;line-height:1;color:var(--navy)}
.r-l{font-size:10px;color:var(--muted-2);margin-top:3px;text-transform:uppercase;letter-spacing:.06em}
.r-late .r-n{color:var(--late)}
.r-wait .r-n{color:var(--wait)}

.tabs-wrap{background:var(--card);border-bottom:1px solid var(--line);position:sticky;top:73px;z-index:30}
.tabs{max-width:960px;margin:0 auto;display:flex;gap:2px;padding:0 20px;overflow-x:auto}
.tab{border:0;background:none;padding:11px 14px;font-size:14px;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;font-family:inherit;font-weight:500}
.tab:hover{color:var(--navy)}
.tab-on{color:var(--navy);border-bottom-color:var(--navy);font-weight:600}

.wrap{max-width:960px;margin:0 auto;padding:20px 20px 70px}
.section{display:flex;flex-direction:column;gap:12px}
.rowhead{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
.rowhead .eyebrow{font-size:11px}

.btn,.btn-accent{display:inline-flex;align-items:center;gap:6px;border-radius:10px;padding:8px 14px;font-size:13.5px;font-weight:600;cursor:pointer;font-family:inherit;border:1px solid var(--line);background:var(--card);color:var(--ink);transition:all .12s ease}
.btn:hover{border-color:var(--navy);color:var(--navy)}
.btn-accent{background:var(--navy);color:#fff;border-color:var(--navy)}
.btn-accent:hover{background:var(--navy-deep)}
.btn-accent:disabled{opacity:.45;cursor:not-allowed}
.btn-sm{padding:6px 11px;font-size:12.5px}

.alert{display:flex;align-items:center;gap:9px;background:var(--late-bg);color:#7A2A20;border-radius:12px;padding:10px 14px;font-size:13.5px}

/* cards de frentes (por cliente / por pessoa) */
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden;box-shadow:var(--shadow-1)}
.card-head{display:flex;align-items:center;gap:9px;padding:11px 15px;font-weight:700;font-size:14.5px;border-bottom:1px solid var(--line)}
.card-head.cli{color:var(--navy)}
.avatar{width:24px;height:24px;border-radius:7px;background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.count{margin-left:auto;font-family:var(--mono);font-size:12px;color:var(--muted);background:var(--paper);padding:1px 9px;border-radius:20px}
.frente{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:11px 15px;border-top:1px solid var(--line)}
.card-head + .frente{border-top:0}
.frente-main{min-width:0}
.frente-cli{font-family:var(--mono);font-size:11px;letter-spacing:.04em;color:var(--navy);text-transform:uppercase}
.frente-dem{font-size:14px;margin-top:2px}
.frente-resp{font-family:var(--mono);font-size:10.5px;color:var(--muted);margin-top:3px;letter-spacing:.02em}
.frente-side{display:flex;align-items:center;gap:9px;flex-shrink:0}
.prazo{display:inline-flex;align-items:center;gap:4px;font-family:var(--mono);font-size:11.5px;color:var(--muted)}
.prazo.late{color:var(--late);font-weight:600}
.pill{display:inline-flex;align-items:center;gap:6px;border-radius:20px;padding:3px 6px 3px 10px}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.pill select{border:0;background:none;font-size:12.5px;font-family:inherit;cursor:pointer;font-weight:600}
.pill select:focus{outline:none}

/* controles da carteira */
.cli-controls{display:flex;flex-direction:column;gap:11px;margin-bottom:2px}
.search-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.search-box{position:relative;flex:1;min-width:200px}
.search-box svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:16px;height:16px;stroke:var(--muted-2);fill:none;stroke-width:2}
.search-box input{width:100%;border:1px solid var(--line);background:var(--card);border-radius:10px;padding:10px 12px 10px 36px;font-family:var(--sans);font-size:14.5px;color:var(--ink)}
.search-box input:focus{outline:none;border-color:var(--navy);box-shadow:0 0 0 3px rgba(40,72,136,.13)}
.toggle-pend{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--line);background:var(--card);border-radius:10px;padding:9px 13px;cursor:pointer;font-family:var(--mono);font-size:11.5px;letter-spacing:.04em;color:var(--muted);text-transform:uppercase;white-space:nowrap;user-select:none}
.toggle-pend .tdot{width:9px;height:9px;border-radius:50%;background:var(--wait);opacity:.4}
.toggle-pend.on{border-color:var(--wait);color:var(--wait);background:var(--wait-bg)}
.toggle-pend.on .tdot{opacity:1}
.tag-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.tag-row .tlabel{font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted-2)}
.chip{border:1px solid var(--line);background:var(--card);color:var(--muted);border-radius:999px;padding:5px 12px;font-size:12.5px;font-weight:500;cursor:pointer;font-family:var(--sans);transition:all .12s ease;user-select:none}
.chip:hover{border-color:var(--navy);color:var(--navy)}
.chip.active{background:var(--navy);border-color:var(--navy);color:#fff}

/* grid de clientes */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:13px;margin-top:14px}
.ccard{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:15px 15px 13px;cursor:pointer;position:relative;box-shadow:var(--shadow-1);transition:transform .14s ease,box-shadow .14s ease,border-color .14s ease;display:flex;flex-direction:column;gap:10px;min-height:158px}
.ccard:hover{transform:translateY(-3px);box-shadow:var(--shadow-2);border-color:var(--navy)}
.ccard:focus-visible{outline:none;border-color:var(--navy);box-shadow:0 0 0 3px rgba(40,72,136,.22)}
.ccard.intern{background:#F6F8FB}
.ctop{display:flex;align-items:flex-start;gap:11px}
.bubble{flex:none;width:44px;height:44px;background:var(--navy);color:#fff;border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:var(--sans);font-weight:800;font-size:15px;position:relative;box-shadow:0 2px 5px rgba(30,52,98,.28)}
.bubble::after{content:"";position:absolute;left:8px;bottom:-5px;width:11px;height:11px;background:var(--navy);border-radius:0 0 2px 0;transform:rotate(45deg)}
.cname{font-family:var(--sans);font-weight:700;font-size:16px;line-height:1.15;letter-spacing:-.01em}
.csector{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:3px}
.ctags{display:flex;gap:5px;flex-wrap:wrap}
.ttag{font-family:var(--mono);font-size:10.5px;color:var(--navy-700);background:var(--navy-soft);border:1px solid var(--line-soft);border-radius:6px;padding:2px 7px;letter-spacing:.02em}
.cmetrics{margin-top:auto;display:flex;align-items:baseline;gap:12px;font-family:var(--mono);font-size:11.5px}
.cmetrics .mopen{color:var(--navy);font-weight:600}
.cmetrics .mwait{color:var(--wait)}
.cmetrics .mnone{color:var(--muted-2)}
.cpv{font-size:12.5px;color:var(--ink)}
.cpv .k{font-family:var(--mono);font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted-2);display:block;margin-bottom:1px}
.flag{position:absolute;top:13px;right:13px;width:10px;height:10px;border-radius:50%;background:var(--wait);box-shadow:0 0 0 3px var(--wait-bg)}
.note-dot{position:absolute;top:12px;right:12px;font-family:var(--mono);font-size:9.5px;color:var(--navy);background:var(--navy-soft);border:1px solid var(--line);border-radius:6px;padding:1px 5px;letter-spacing:.05em}
.ccard.has-flag .note-dot{right:31px}

.empty{padding:28px;text-align:center;background:var(--card);border:1px dashed var(--line);border-radius:14px;color:var(--muted)}
.empty strong{display:block;color:var(--ink);font-weight:700;font-size:16px;margin-bottom:5px}
.empty button{margin-top:12px;background:none;border:1px solid var(--navy);color:var(--navy);border-radius:9px;padding:7px 15px;font-family:inherit;font-size:13.5px;cursor:pointer}

/* pautas */
.pautas{display:flex;flex-direction:column;gap:12px}
.pauta{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 15px;box-shadow:var(--shadow-1)}
.pauta-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.pauta-title{font-size:14.5px;font-weight:600;margin-top:3px}
.psteps{margin-top:11px;display:flex;flex-direction:column}
.pstep{display:flex;gap:9px;padding:8px 0;border-top:1px solid var(--line)}
.psteps .pstep:first-child{border-top:0}
.pstep-mark{width:16px;flex-shrink:0;font-family:var(--mono);color:var(--muted-2);display:flex;justify-content:center;align-items:flex-start;padding-top:1px}
.pstep-done .pstep-mark,.pstep-now .pstep-mark{color:var(--navy)}
.pstep-body{flex:1;min-width:0}
.pstep-label{font-size:13.5px}
.pstep-todo .pstep-label{color:var(--muted)}
.pstep-val{font-family:var(--mono);font-size:12px;color:var(--navy)}
.pstep-q{font-size:12.5px;color:var(--muted);margin:4px 0 8px}
.pchoice{display:flex;gap:6px;flex-wrap:wrap}

/* forms */
.form{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;box-shadow:var(--shadow-1)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.input{border:1px solid var(--line);border-radius:9px;padding:9px 11px;font-size:14px;font-family:inherit;color:var(--ink);background:#fff;width:100%}
.input:focus{outline:none;border-color:var(--navy);box-shadow:0 0 0 3px rgba(40,72,136,.12)}
.wide{grid-column:1 / -1}
.form-actions{display:flex;justify-content:flex-end;gap:9px;margin-top:11px}
.form-cli{font-family:var(--mono);font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--navy);margin-bottom:9px}

/* resumos */
.actions{display:flex;gap:9px;flex-wrap:wrap}
.resumo{position:relative}
.copy{position:absolute;top:10px;right:10px;display:inline-flex;align-items:center;gap:5px;border:1px solid var(--line);background:#fff;border-radius:8px;padding:5px 10px;font-size:12.5px;cursor:pointer;color:var(--navy);font-family:inherit;font-weight:600}
textarea.out{width:100%;min-height:320px;border:1px solid var(--line);border-radius:12px;padding:14px;font-family:var(--mono);font-size:12.5px;line-height:1.55;color:var(--ink);background:#fff;resize:vertical;white-space:pre}
.hint,.foot{color:var(--muted);font-size:13px}
.foot{border-top:1px solid var(--line);padding-top:10px}
.credit{max-width:960px;margin:22px auto 0;padding:0 20px;text-align:center;font-family:var(--mono);font-size:11px;color:var(--muted-2);letter-spacing:.03em}

/* drawer */
.scrim{position:fixed;inset:0;background:rgba(22,32,58,.42);opacity:0;pointer-events:none;transition:opacity .22s ease;z-index:60;backdrop-filter:blur(1px)}
.scrim.open{opacity:1;pointer-events:auto}
.drawer{position:fixed;top:0;right:0;height:100%;width:min(540px,96vw);background:var(--card);box-shadow:-14px 0 40px rgba(22,32,58,.22);z-index:70;transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column}
.drawer.open{transform:none}
.drawer-head{padding:20px 24px 0;border-bottom:1px solid var(--line)}
.dh-top{display:flex;gap:13px;align-items:flex-start}
.dh-top .bubble{width:50px;height:50px;font-size:17px}
.dh-txt{flex:1;min-width:0}
.dh-txt h2{font-family:var(--sans);font-weight:800;font-size:22px;margin:2px 0 4px;line-height:1.08;letter-spacing:-.015em}
.dh-site{font-family:var(--mono);font-size:12.5px}
.dh-site a{color:var(--navy);text-decoration:none;border-bottom:1px solid rgba(40,72,136,.3)}
.dh-site.tbd{color:var(--wait)}
.x-btn{flex:none;background:none;border:1px solid var(--line);border-radius:9px;width:36px;height:36px;cursor:pointer;color:var(--muted);display:flex;align-items:center;justify-content:center;font-size:20px;line-height:1}
.x-btn:hover{border-color:var(--navy);color:var(--navy)}
.dtabs{display:flex;gap:2px;margin-top:16px}
.dtab{border:0;background:none;padding:9px 13px;font-size:13.5px;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;font-family:inherit;font-weight:500}
.dtab-on{color:var(--navy);border-bottom-color:var(--navy);font-weight:600}
.drawer-body{padding:20px 24px 44px;overflow-y:auto;flex:1}
.dtags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px}
.dtags .ttag{font-size:11px;padding:3px 9px}
.sec{margin-bottom:20px}
.sec-lbl{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--navy);font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.sec-lbl::before{content:"";width:16px;height:2px;background:var(--navy);display:inline-block}
.sec p{font-family:var(--serif);font-size:16px;line-height:1.6;color:#26304A;margin:0 0 10px}
.pv-inline{font-family:var(--mono);font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px}
.pv-inline b{color:var(--ink);font-weight:600}
.dalert{border-radius:10px;padding:13px 15px;margin-bottom:18px}
.dalert .a-lbl{font-family:var(--mono);font-size:10.5px;letter-spacing:.13em;text-transform:uppercase;font-weight:600;margin-bottom:5px}
.dalert p{margin:0;font-size:14px;line-height:1.5}
.dalert.confirm{background:var(--wait-bg);border:1px solid #E4CFA0}
.dalert.confirm .a-lbl{color:var(--wait)}
.dalert.confirm p{color:#5f4413}
.dalert.guard{background:var(--late-bg);border:1px solid #E2BEB7}
.dalert.guard .a-lbl{color:var(--late)}
.dalert.guard p{color:#6f2b21}
.note-block{border-top:1px dashed var(--line);padding-top:16px}
.note-block textarea{width:100%;min-height:72px;border:1px solid var(--line);border-radius:10px;padding:11px 12px;font-family:var(--sans);font-size:14px;color:var(--ink);resize:vertical;line-height:1.45}
.note-block textarea:focus{outline:none;border-color:var(--navy);box-shadow:0 0 0 3px rgba(40,72,136,.12)}
.note-actions{display:flex;align-items:center;gap:12px;margin-top:9px}
.note-saved{font-family:var(--mono);font-size:11px;color:var(--done);opacity:0;transition:opacity .2s}
.note-saved.show{opacity:1}
.d-frentes .frente:first-child{border-top:0}
.d-frentes .frente{padding-left:0;padding-right:0}
.mini-add{margin-top:12px}

#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:10px 18px;border-radius:24px;font-size:13px;box-shadow:0 6px 22px rgba(22,32,58,.3);opacity:0;pointer-events:none;transition:.2s;z-index:90}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

/* filtros de status */
.fchips{display:flex;gap:6px;flex-wrap:wrap}
.r-apr .r-n{color:#5A3E85}

/* rodapé de ações da frente */
.frente{flex-wrap:wrap}
.frente-foot{width:100%;display:flex;align-items:center;gap:8px;margin-top:7px}
.cbtn{display:inline-flex;align-items:center;gap:5px;border:1px solid var(--line);background:var(--card);color:var(--muted);border-radius:8px;padding:5px 9px;font-family:var(--mono);font-size:11.5px;cursor:pointer}
.cbtn:hover{border-color:var(--navy);color:var(--navy)}
.cbtn.has{color:var(--navy);border-color:#B9C6DE;background:var(--navy-soft)}
.pill-static{font-size:12.5px;font-weight:600;padding:4px 11px}

/* thread de comentários */
.cthread{width:100%;background:#F6F8FB;border:1px solid var(--line-soft);border-radius:10px;padding:10px 12px;margin-top:8px}
.cmt{padding:7px 0;border-top:1px dashed var(--line-soft)}
.cthread .cmt:first-child{border-top:0;padding-top:2px}
.cmt-meta{font-family:var(--mono);font-size:10.5px;color:var(--muted-2);letter-spacing:.03em;margin-bottom:2px}
.cmt-txt{font-size:13.5px;line-height:1.45}
.cmt-empty{font-size:12.5px;color:var(--muted-2);padding:2px 0 6px}
.cmt-form{display:flex;gap:7px;margin-top:8px;flex-wrap:wrap}
.cmt-form .cmt-autor{flex:0 1 150px;padding:7px 10px;font-size:13px}
.cmt-form .cmt-texto{flex:1 1 200px;padding:7px 10px;font-size:13px}

/* conclusão e aprovação */
.approve-box{width:100%;background:#F4F1F9;border:1px solid #DCD3EA;border-radius:10px;padding:12px 13px;margin-top:8px}
.ap-lbl{font-family:var(--mono);font-size:10.5px;letter-spacing:.13em;text-transform:uppercase;font-weight:600;color:#5A3E85;margin-bottom:6px}
.ap-hint{font-size:12.5px;color:var(--muted);margin-bottom:8px;line-height:1.45}
.ap-res{font-family:var(--mono);font-size:12px;margin-bottom:6px;display:flex;align-items:center;gap:6px;word-break:break-all}
.ap-res a{color:var(--navy)}
.ap-res.ap-miss{color:var(--late)}
.ap-nota{font-size:13px;color:var(--muted);margin-bottom:6px}
.ap-actions{display:flex;gap:7px;align-items:center;margin-top:9px;flex-wrap:wrap}
.ap-gestor{max-width:130px;padding:6px 9px;font-size:13px}

/* histórico */
.hist-controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.hist-pessoa{max-width:210px;padding:8px 10px;font-size:13.5px}
.hist-item{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 15px;display:flex;justify-content:space-between;align-items:center;gap:12px;box-shadow:var(--shadow-1)}
.hist-main{min-width:0}
.hist-meta{font-family:var(--mono);font-size:11px;color:var(--muted-2);margin-top:4px}
.hist-side{flex-shrink:0}
.res-link{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:11.5px;color:var(--navy);text-decoration:none;border:1px solid var(--line);border-radius:8px;padding:5px 9px}
.res-link:hover{border-color:var(--navy)}
.res-miss{font-family:var(--mono);font-size:11px;color:var(--muted-2)}

@media(max-width:640px){
  .head-inner{padding:12px 15px 10px}
  .brand img{height:40px}
  .brand h1{font-size:18px}
  .tabs-wrap{top:64px}
  .tabs,.wrap,.credit{padding-left:15px;padding-right:15px}
  .r{min-width:52px;padding:5px 7px}
  .frente{flex-direction:column;align-items:flex-start;gap:8px}
  .frente-side{width:100%;justify-content:space-between}
  .form-grid{grid-template-columns:1fr}
  .drawer{width:100vw}
  .drawer-head{padding:16px 16px 0}
  .drawer-body{padding:16px 16px 40px}
}
@media (prefers-reduced-motion:reduce){*{transition-duration:.01ms!important}}
</style>

var CLIENTES=[
  {id:"abridef",nome:"ABRIDEF",setor:"Tecnologia assistiva e inclusão",site:null,pv:"A definir",oferta:true,match:["ABRIDEF"],tags:["Social/Inclusão","Tecnologia","ESG"],
   resumo:"Associação Brasileira da Indústria, Comércio e Serviços de Tecnologia Assistiva, a ABRIDEF representa o setor de produtos e serviços voltados a pessoas com deficiência no Brasil. Sua atuação combina defesa de direitos, promoção da tecnologia assistiva, certificação de qualidade e apoio à inclusão social e à acessibilidade, o que a coloca como uma das vozes de referência do segmento no país.",
   gancho:"Pauta de forte apelo social e de inovação ao mesmo tempo. A entidade tem legitimidade para discutir acessibilidade, inclusão produtiva e o mercado de tecnologia assistiva sem soar institucional demais. Conversa bem com podcasts de ESG, diversidade e inclusão, inovação social e direitos, e com programas de tecnologia que queiram um recorte humano.",
   confirmar:"Site institucional a confirmar antes de qualquer divulgação externa."},
  {id:"anacouto",nome:"Ana Couto",setor:"Branding e valor de marca",site:"anacouto.com.br",pv:"Ana Couto (e Fernanda, Danilo)",oferta:true,match:["Ana Couto"],tags:["Marca/Branding","Negócios","Consumo"],
   resumo:"Há mais de três décadas, a anacouto impulsiona o valor de marcas e organizações com uma metodologia proprietária que integra marca, negócio, experiência e crescimento à estratégia corporativa. Fundada pela designer Ana Couto, é referência em branding no Brasil e já atendeu mais de 400 empresas, entre elas Itaú, Natura, CBF, Brastemp e Havaianas, somando mais de 50 prêmios nacionais e internacionais. Seu ecossistema inclui a LAJE, plataforma de educação em branding, o Valometry, ferramenta que mede o valor das marcas por dados, e o festival É, Faz & Fala.",
   gancho:"Ana Couto é uma porta-voz de autoridade rara em branding e brasilidade, e o estudo Branding que Vale, ligado à Copa do Mundo, dá um gancho de atualidade imediato. A frente já mapeada inclui Times Brasil, Divã de CNPJ, Os Sócios, Café com Ferri, Mundo Corporativo CBN, Reclame e uma conversa com Cris Arcangeli.",
   confirmar:null},
  {id:"bruno",nome:"Bruno Pinheiro",setor:"IA aplicada e gestão (Groovia)",site:null,pv:"Bruno Pinheiro",oferta:true,match:["Bruno Pinheiro","Groovia"],tags:["IA/Tech","Gestão","Empreendedorismo"],
   resumo:"Fundador da consultoria franco-brasileira Groovia, Bruno Pinheiro é especialista em implementação de inteligência artificial em ambientes corporativos. Conhecido na primeira onda do empreendedorismo digital brasileiro, vendeu empresas, atuou como executivo, liderou operações em cinco países e escreveu um best-seller sobre empreender sem fronteiras antes de reposicionar a carreira em torno de uma tese de gestão. Defende que o problema da IA nas empresas não é a tecnologia, e sim a pressa em colocá-la sobre equipes despreparadas, com custo direto sobre a produtividade e a saúde dos times. Resume a posição na divisa AI First, Human Always.",
   gancho:"É o cliente com janela mais quente para áudio e vídeo. O recorte mais forte para conversas longas é a virada pessoal, do nômade digital ao executivo que questiona o modelo de sucesso, somado ao debate de gestão sobre a corrida da IA e o custo humano da implementação mal conduzida.",
   confirmar:"Site a confirmar. Janela presencial nesta semana, antes do embarque para a França: nomes e agenda dos podcasts (programa do Pedro, filho do Cortella; inteligência orgânica; Profissional do Futuro) ainda a fechar."},
  {id:"catarinense",nome:"Catarinense",setor:"Farmacêutica e fitoterapia",site:"catarinensepharma.com.br",pv:"Alexandre (cargo a confirmar)",oferta:true,match:["Catarinense"],tags:["Saúde","Consumo","Farma"],
   resumo:"Com 80 anos de história, a Catarinense é uma das principais indústrias farmacêuticas do país, especializada em fitoterápicos, vitaminas e suplementos. Tem sede em Joinville (SC) e unidade fabril e centro de distribuição em Aparecida de Goiânia (GO), com portfólio de mais de 500 produtos. É líder nacional em Ômega 3 e reúne marcas como Melagrião, Figatil e Sadol, além das linhas Catarinense Nutrição e Fontívia. Posiciona-se como a Fonte de Saúde do Brasil.",
   gancho:"Há duas frentes complementares de pauta, a institucional e a de produto, e a oportunidade de abrir mais espaço para o porta-voz. O território de saúde, autocuidado e fitoterapia rende em formatos como Por trás do Balcão, Cliente SA, Desmarketize-se, É, Faz & Fala, Farmácia em Dia (CRF-SP) e Mundo Corporativo.",
   confirmar:"Cargo completo de Alexandre a confirmar."},
  {id:"dio",nome:"DIO",setor:"Educação em tecnologia (open education)",site:"dio.me",pv:"A definir",oferta:true,match:["DIO"],tags:["Educação","Tech","Carreira"],
   resumo:"Fundada em 2018, a DIO é a primeira plataforma de open education brasileira voltada a democratizar o conhecimento em desenvolvimento de software e tecnologias exponenciais, com a meta de acelerar a formação de talentos digitais. Seu ecossistema reúne mais de 215 mil desenvolvedores, 160 instituições de ensino, centenas de mentores e mais de mil empresas conectadas por programas educacionais, com mais de dois milhões de bolsas já distribuídas por todo o Brasil.",
   gancho:"A história combina três temas de alta demanda editorial: educação, tecnologia e formação de talentos. Funciona em podcasts de tecnologia e carreira, de educação e de empreendedorismo, sempre que houver espaço para discutir empregabilidade em tech, inclusão digital e o futuro do trabalho para quem programa.",
   confirmar:null},
  {id:"scolari",nome:"Fabio Scolari Advogados",setor:"Direito e contas públicas",site:null,pv:"Fábio Scolari Vieira",oferta:true,match:["Fabio Scolari Advogados","Fábio Scolari","SNOF"],tags:["Direito","Contas públicas","Finanças pessoais"],
   resumo:"Fábio Scolari Vieira é sócio do escritório Scolari Neto & Oliveira Filho, fundado em 2008 e especializado na defesa de direitos de servidores públicos, além de atuar em Direito do Consumidor e Direito Processual Civil. É secretário da Comissão de Assuntos relativos aos Precatórios Judiciais da OAB/SP e secretário do Madeca, o que lhe dá lastro para tratar de segurança jurídica e do funcionamento, na prática, das filas de pagamento do Estado.",
   gancho:"O gancho mais forte é o debate atual sobre os acordos de precatórios em São Paulo e o deságio cobrado de quem já tem decisão definitiva, tema em que ele tem posição pública e dados para sustentar. Conversa bem com podcasts jurídicos, de servidores públicos e de finanças pessoais, e com programas de debate sobre Justiça e contas públicas.",
   confirmar:"Site a confirmar."},
  {id:"milho",nome:"Milho de Ouro",setor:"Snacks e marca (Lobits)",site:"milhodeouro.com.br",pv:"2ª geração da família (nome a confirmar)",oferta:true,match:["Milho de Ouro"],tags:["Consumo/Varejo","Empresa familiar","Marca"],
   resumo:"Indústria brasileira de snacks com mais de 30 anos de atuação, a Milho de Ouro tem fábrica em Embu das Artes (SP), capacidade de até 1.400 toneladas por mês e presença em cerca de 20 mil pontos de venda. É dona da marca Lobits e vem conduzida pela segunda geração da família, com um movimento recente de unificação de portfólio sob a marca e crescimento acima da média do mercado.",

    return Object.assign({criadaEm:"",comentarios:[],resultado:null,aprovadoPor:""},f,{
      comentarios:Array.isArray(f.comentarios)?f.comentarios:[],
      resultado:f.resultado||null
    });
  });
}
function loadKey(keyNew,olds,seed,mig){
  if(!LS)return mig?mig(JSON.parse(JSON.stringify(seed))):JSON.parse(JSON.stringify(seed));
  try{
    var v=LS.getItem(keyNew);
    if(v){var arr=JSON.parse(v);return mig?mig(arr):arr;}
    for(var i=0;i<olds.length;i++){var o=LS.getItem(olds[i]);if(o){var arr2=JSON.parse(o);return mig?mig(arr2):arr2;}}
    return mig?mig(JSON.parse(JSON.stringify(seed))):JSON.parse(JSON.stringify(seed));
  }catch(e){return mig?mig(JSON.parse(JSON.stringify(seed))):JSON.parse(JSON.stringify(seed));}
}

/* ===== helpers ===== */
function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];});}
function norm(s){return String(s==null?"":s).normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase().trim();}
function hoje0(){var d=new Date();d.setHours(0,0,0,0);return d;}
function overdue(p){if(!p)return false;return new Date(p+"T00:00:00")<hoje0();}
function fmtBR(iso){if(!iso)return"";var p=iso.split("-");return p[2]+"/"+p[1];}
function fmtBRfull(iso){if(!iso)return"";var p=iso.split("-");return p[2]+"/"+p[1]+"/"+p[0];}
function hojeBR(){var d=new Date();var z=function(n){return String(n).padStart(2,"0");};return z(d.getDate())+"/"+z(d.getMonth()+1)+"/"+d.getFullYear();}
function isoHoje(){return new Date().toISOString().slice(0,10);}
function diasEntre(a,b){return Math.round((new Date(b+"T00:00:00")-new Date(a+"T00:00:00"))/86400000);}
function dentroDias(iso,dias){if(!iso)return false;if(!dias)return true;var lim=hoje0();lim.setDate(lim.getDate()-dias);return new Date(iso+"T00:00:00")>=lim;}
function stepDone(proc,k){var v=proc[k];if(v===true)return true;if(typeof v==="string"&&v!=="")return true;return false;}
function proxima(p){for(var i=0;i<STEPS.length;i++){if(!stepDone(p.proc,STEPS[i].k))return STEPS[i];}return null;}
function nDone(p){return STEPS.filter(function(s){return stepDone(p.proc,s.k);}).length;}
function abertas(){return frentes.filter(function(f){return !f.arquivada&&f.status!=="Concluído";});}
function emAprovacao(){return abertas().filter(function(f){return f.status==="Em aprovação";});}
function concluidasVis(){return frentes.filter(function(f){return !f.arquivada&&f.status==="Concluído";});}
function arquivadas(){return frentes.filter(function(f){return f.arquivada;});}
function isWaiting(f){return f.status.indexOf("Aguardando")===0||f.status==="Travado";}
function respList(f){return String(f.responsavel).split(",").map(function(s){return s.trim();}).filter(Boolean);}
function pessoas(){
  var set={};
  frentes.forEach(function(f){respList(f).forEach(function(p){set[p]=1;});});
  return Object.keys(set).sort(function(a,b){return a.localeCompare(b,"pt-BR");});
}
function initials(nome){
  var clean=nome.replace(/^Grupo\s+/i,"").replace(/\s*\(interno\)\s*/i,"");
  var parts=clean.split(/\s+/).filter(Boolean);
  if(parts.length===1)return parts[0].slice(0,2).toUpperCase();
  return (parts[0][0]+parts[1][0]).toUpperCase();
}
function clienteIdFromName(name){
  var n=norm(name);
  for(var i=0;i<CLIENTES.length;i++){
    var c=CLIENTES[i];
    if(norm(c.nome)===n)return c.id;
    for(var j=0;j<c.match.length;j++){if(norm(c.match[j])===n)return c.id;}
  }
  return null;
}
function autoClients(){
  var map={};
  function consider(name){
    if(clienteIdFromName(name))return;
    var id="auto:"+norm(name);
    if(!map[id])map[id]={id:id,nome:name,setor:"Sem ficha",site:null,pv:"—",oferta:false,auto:true,match:[name],tags:["Sem ficha"],resumo:"Conta ainda sem ficha na carteira. Adicione o perfil quando disponível.",gancho:null,confirmar:"Perfil a completar."};
  }
  frentes.forEach(function(f){consider(f.cliente);});
  pautas.forEach(function(p){consider(p.cliente);});
  return map;
}
function clientById(id){for(var i=0;i<CLIENTES.length;i++){if(CLIENTES[i].id===id)return CLIENTES[i];}return autoClients()[id]||null;}
function matchCliente(name,cli){if(cli.auto)return norm(name)===norm(cli.nome);return clienteIdFromName(name)===cli.id;}
function frentesDoCliente(cli){return frentes.filter(function(f){return matchCliente(f.cliente,cli);});}
function pautasDoCliente(cli){return pautas.filter(function(p){return matchCliente(p.cliente,cli);});}
function abertasCli(cli){return frentesDoCliente(cli).filter(function(f){return !f.arquivada&&f.status!=="Concluído";});}
function aguardCli(cli){return abertasCli(cli).filter(isWaiting);}
function frenteById(id){for(var i=0;i<frentes.length;i++){if(frentes[i].id===id)return frentes[i];}return null;}

/* ===== filtros de status (Hoje) ===== */
var FILTROS=[
  {k:null,label:"Todas"},
  {k:"vencidas",label:"Vencidas"},
  {k:"Travado",label:"Travadas"},
  {k:"Aguardando cliente",label:"Aguard. cliente"},
  {k:"Aguardando veículo",label:"Aguard. veículo"},
  {k:"Em aprovação",label:"Em aprovação"},
  {k:"Em andamento",label:"Em andamento"},
  {k:"A fazer",label:"A fazer"}
];
function passaFiltro(f){
  if(!ui.fStatus)return true;
  if(ui.fStatus==="vencidas")return overdue(f.prazo);
  return f.status===ui.fStatus;
}

/* ===== render: linha de frente ===== */
function pill(f){
  if(f.status==="Em aprovação"||f.status==="Concluído"){
    var st=STATUS[f.status];
    return '<span class="pill pill-static" style="background:'+st.bg+';color:'+st.fg+'"><span class="dot" style="background:'+st.dot+'"></span>'+f.status+'</span>';
  }
  var s=STATUS[f.status]||STATUS["A fazer"];
  var opts=STATUS_EDIT.map(function(o){return '<option '+(o===f.status?"selected":"")+'>'+o+'</option>';}).join("");
  if(STATUS_EDIT.indexOf(f.status)===-1)opts='<option selected>'+esc(f.status)+'</option>'+opts;
  return '<span class="pill" style="background:'+s.bg+';color:'+s.fg+'"><span class="dot" style="background:'+s.dot+'"></span><select data-act="status" data-id="'+f.id+'" style="color:'+s.fg+'">'+opts+'</select></span>';
}
function cmtThread(f){
  var h='<div class="cthread">';
  if(f.comentarios.length){
    f.comentarios.forEach(function(c){
      h+='<div class="cmt"><div class="cmt-meta">'+esc(c.autor)+' · '+fmtBRfull(c.quando)+'</div><div class="cmt-txt">'+esc(c.txt)+'</div></div>';
    });
  }else{
    h+='<div class="cmt-empty">Sem comentários ainda.</div>';
  }
  var dl='<datalist id="dlPessoas">'+pessoas().concat(GESTORES).filter(function(v,i,a){return a.indexOf(v)===i;}).map(function(p){return '<option value="'+esc(p)+'">';}).join("")+'</datalist>';
  h+='<div class="cmt-form">'+dl+'<input class="input cmt-autor" id="cmtAutor'+f.id+'" list="dlPessoas" placeholder="Quem comenta"><input class="input cmt-texto" id="cmtTxt'+f.id+'" placeholder="Comentário (contexto, pendência, recado)"><button class="btn-accent btn-sm" data-act="addCmt" data-id="'+f.id+'">Comentar</button></div></div>';
  return h;
}

    '<div class="ap-hint">A frente só é concluída com resultado comprovado. Cole o link da entrega (matéria publicada, clipping, documento aprovado).</div>'+

    '<div class="ap-actions"><button class="btn btn-sm" data-act="cancelConcluir">Cancelar</button><button class="btn-accent btn-sm" data-act="enviarAprov" data-id="'+f.id+'">Enviar para aprovação</button></div></div>';
}
function aprovBox(f){
  var link=f.resultado&&f.resultado.link?f.resultado.link:"";
  var nota=f.resultado&&f.resultado.nota?f.resultado.nota:"";
  var gest=GESTORES.map(function(g){return '<option>'+g+'</option>';}).join("");

    (link?'<div class="ap-res">'+LINKI+' <a href="'+esc(link)+'" target="_blank" rel="noopener">'+esc(link)+'</a></div>':'<div class="ap-res ap-miss">Sem link de resultado registrado.</div>')+

function frenteRow(f,hideCli,showResp){
  var late=overdue(f.prazo);
  var prazo=f.prazo?'<span class="prazo '+(late?"late":"")+'">'+CLOCK+' '+fmtBR(f.prazo)+'</span>':"";
  var cli=hideCli?"":'<div class="frente-cli">'+esc(f.cliente)+'</div>';
  var resp=showResp?'<div class="frente-resp">'+esc(f.responsavel)+'</div>':"";
  var nCmt=f.comentarios.length;
  var acts='<div class="frente-foot">'+
    '<button class="cbtn '+(nCmt?"has":"")+'" data-act="cmt" data-id="'+f.id+'">'+BUBBLE+(nCmt?' '+nCmt:"")+'</button>';
  if(f.status!=="Em aprovação"&&f.status!=="Concluído"){
    acts+='<button class="btn btn-sm" data-act="concluir" data-id="'+f.id+'">Concluir…</button>';
  }
  acts+='</div>';
  var extra="";
  if(ui.concluirId===f.id)extra=concluirForm(f);
  else if(f.status==="Em aprovação")extra=aprovBox(f);
  if(ui.openCmt===f.id)extra+=cmtThread(f);
  return '<div class="frente"><div class="frente-main">'+cli+'<div class="frente-dem">'+esc(f.demanda)+'</div>'+resp+'</div><div class="frente-side">'+prazo+pill(f)+'</div>'+acts+extra+'</div>';
}

/* ===== views ===== */
function viewHoje(){
  var ab=abertas().filter(passaFiltro);
  var groups={};var order=[];
  ab.forEach(function(f){
    var id=clienteIdFromName(f.cliente)||("auto:"+norm(f.cliente));
    if(!groups[id]){var c=clientById(id);groups[id]={id:id,nome:c?c.nome:f.cliente,list:[]};order.push(id);}
    groups[id].list.push(f);
  });
  function score(g){var nv=0,nw=0;g.list.forEach(function(f){if(overdue(f.prazo))nv++;if(isWaiting(f))nw++;});return{nv:nv,nw:nw,no:g.list.length};}
  order.sort(function(a,b){var sa=score(groups[a]),sb=score(groups[b]);return (sb.nv-sa.nv)||(sb.nw-sa.nw)||(sb.no-sa.no)||groups[a].nome.localeCompare(groups[b].nome,"pt-BR");});
  var allAb=abertas();
  var venc=allAb.filter(function(f){return overdue(f.prazo);}).length;
  var esp=allAb.filter(isWaiting).length;
  var apr=emAprovacao().length;
  var h='<div class="section"><div class="rowhead"><span class="eyebrow">Radar do dia · por cliente</span><button class="btn-accent" data-act="toggleForm">+ Nova frente</button></div>';
  h+='<div class="fchips">'+FILTROS.map(function(ft){
    var on=(ui.fStatus===ft.k);
    return '<button class="chip '+(on?"active":"")+'" data-act="fStatus" data-k="'+(ft.k===null?"":esc(ft.k))+'">'+ft.label+'</button>';
  }).join("")+'</div>';
  if(ui.showForm)h+=formHTML();
  if(venc+esp+apr>0&&!ui.fStatus)h+='<div class="alert">'+WARN+'<span>'+venc+' com prazo vencido · '+esp+' aguardando ou travadas · '+apr+' esperando aprovação do gestor.</span></div>';
  if(!order.length)h+='<div class="empty">'+(ui.fStatus?"Nada neste filtro.":"Nenhuma frente aberta. Bom dia limpo.")+'</div>';
  order.forEach(function(id){
    var g=groups[id];
    h+='<div class="card"><div class="card-head cli" data-act="openCli" data-cli="'+esc(id)+'" data-dtab="frentes" style="cursor:pointer"><span class="avatar">'+esc(initials(g.nome))+'</span>'+esc(g.nome)+'<span class="count">'+g.list.length+'</span></div>';
    g.list.forEach(function(f){h+=frenteRow(f,true,true);});
    h+='</div>';
  });
  return h+'</div>';
}

  return '<div class="section"><div class="cli-controls">'+
    '<div class="search-row"><div class="search-box">'+SEARCH+'<input id="cliSearch" type="text" placeholder="Buscar conta, setor, porta-voz ou tema…" autocomplete="off" value="'+esc(ui.q)+'"></div>'+
    '<button class="toggle-pend '+(ui.pend?"on":"")+'" data-act="cliPend"><span class="tdot"></span>Só pendências</button></div>'+

    '<div class="grid" id="cliGrid"></div></div>';

function allTags(){
  var set={};CLIENTES.forEach(function(c){c.tags.forEach(function(t){if(t!=="Sem ficha")set[t]=1;});});
  return Object.keys(set).sort(function(a,b){return a.localeCompare(b,"pt-BR");});
}
function renderCliTags(){
  var row=document.getElementById("cliTags");if(!row)return;
  var html='<span class="tlabel">Temas</span>';
  allTags().forEach(function(t){
    html+='<button class="chip '+(ui.tag===t?"active":"")+'" data-act="cliTag" data-tag="'+esc(t)+'">'+esc(t)+'</button>';
  });

function cliMatchesFilter(c){
  if(ui.pend&&!c.confirmar&&!c.guardrail)return false;
  if(ui.tag&&c.tags.indexOf(ui.tag)===-1)return false;
  var q=norm(ui.q);
  if(!q)return true;
  var hay=norm([c.nome,c.setor,c.pv,c.resumo||"",c.gancho||"",c.site||"",c.tags.join(" ")].join(" "));
  return hay.indexOf(q)!==-1;
}
function renderCliGrid(){
  var grid=document.getElementById("cliGrid");if(!grid)return;
  var extra=autoClients();var list=CLIENTES.slice();
  Object.keys(extra).forEach(function(k){list.push(extra[k]);});
  list=list.filter(cliMatchesFilter);
  if(!list.length){
    grid.innerHTML='<div class="empty" style="grid-column:1/-1"><strong>Nenhuma conta encontrada</strong>Ajuste a busca ou limpe os filtros.<br><button data-act="cliClear">Limpar filtros</button></div>';
    return;
  }
  var html="";
  list.forEach(function(c){
    var nOpen=abertasCli(c).length;
    var nWait=aguardCli(c).length;
    var hasFlag=!!(c.confirmar||c.guardrail);
    var hasNote=!!(notes[c.id]&&notes[c.id].trim());
    var metrics=nOpen>0?('<span class="mopen">'+nOpen+' aberta'+(nOpen>1?"s":"")+'</span>'+(nWait>0?'<span class="mwait">'+nWait+' aguardando</span>':"")):'<span class="mnone">sem frente aberta</span>';
    html+='<div class="ccard '+(c.oferta?"":"intern")+(hasFlag?" has-flag":"")+'" tabindex="0" data-act="openCli" data-cli="'+esc(c.id)+'">'+
      (hasFlag?'<span class="flag" title="Pontos a confirmar"></span>':"")+
      (hasNote?'<span class="note-dot" title="Tem nota interna">nota</span>':"")+
      '<div class="ctop"><div class="bubble">'+esc(initials(c.nome))+'</div><div><div class="cname">'+esc(c.nome)+'</div><div class="csector">'+esc(c.setor)+'</div></div></div>'+
      '<div class="ctags">'+c.tags.slice(0,3).map(function(t){return '<span class="ttag">'+esc(t)+'</span>';}).join("")+'</div>'+
      '<div class="cmetrics">'+metrics+'</div>'+
      '<div class="cpv"><span class="k">Porta-voz</span>'+esc(c.pv)+'</div>'+
    '</div>';
  });
  grid.innerHTML=html;
}
function hydrateClientes(){
  renderCliTags();renderCliGrid();
  var s=document.getElementById("cliSearch");
  if(s){s.oninput=function(e){ui.q=e.target.value;renderCliGrid();};}

function stepControl(p,step){
  var id=p.id;
  if(step.type==="gate")return '<button class="btn-accent btn-sm" data-act="proc" data-id="'+id+'" data-step="'+step.k+'" data-val="1">Marcar feito</button>';
  if(step.type==="date")return '<button class="btn-accent btn-sm" data-act="proc" data-id="'+id+'" data-step="'+step.k+'" data-val="hoje">Registrar (hoje)</button>';
  if(step.type==="choice")return '<div class="pchoice">'+step.opts.map(function(o){return '<button class="btn btn-sm" data-act="proc" data-id="'+id+'" data-step="'+step.k+'" data-val="'+esc(o)+'">'+esc(o)+'</button>';}).join("")+'</div>';
  return "";
}
function pautaCard(p,hideCli){
  var next=proxima(p);
  var steps="";
  STEPS.forEach(function(s){
    var done=stepDone(p.proc,s.k);
    var now=next&&next.k===s.k;
    var val="";
    if(done){var v=p.proc[s.k];val=v===true?"feito":(s.type==="date"?fmtBR(v):esc(v));}
    var cls=done?"pstep-done":(now?"pstep-now":"pstep-todo");
    var extra="";
    if(done&&s.k==="estrategia"&&p.proc.estrategia==="Exclusiva")extra='<input class="input" style="margin-top:6px;max-width:320px;padding:6px 9px;font-size:13px" data-act="exclusiva" data-id="'+p.id+'" placeholder="Veículo(s) da exclusiva" value="'+esc(p.proc.exclusiva||"")+'">';
    steps+='<div class="pstep '+cls+'"><span class="pstep-mark">'+(done?CHECK:(now?"›":""))+'</span><div class="pstep-body"><div class="pstep-label">'+s.label+(done&&val?' · <span class="pstep-val">'+val+'</span>':"")+'</div>'+(now?'<div class="pstep-q">'+s.q+'</div>'+stepControl(p,s):"")+extra+'</div></div>';
  });
  var cliLine=hideCli?esc(p.responsavel):(esc(p.cliente)+' · '+esc(p.responsavel));
  var head='<div class="pauta-top"><div><div class="frente-cli">'+cliLine+'</div><div class="pauta-title">'+esc(p.pauta)+'</div></div><span class="count">'+nDone(p)+'/'+STEPS.length+'</span></div>';
  var ok=!next?'<div style="margin-top:8px"><span class="pstep-label" style="color:var(--navy);font-weight:600">Ciclo completo</span></div>':"";
  return '<div class="pauta">'+head+'<div class="psteps">'+steps+'</div>'+ok+'</div>';
}
function viewPautas(){
  var h='<div class="section"><div class="rowhead"><span class="eyebrow">Funil de divulgação · segue o processo</span><button class="btn-accent" data-act="toggleFormP">+ Nova pauta</button></div>';
  if(ui.showFormP)h+=formPautaHTML();
  h+='<div class="pautas">';
  if(!pautas.length)h+='<div class="empty">Nenhuma pauta no funil.</div>';
  pautas.forEach(function(p){h+=pautaCard(p);});
  return h+'</div></div>';
}
function viewResumos(){
  var nConc=concluidasVis().length;
  var h='<div class="section"><div class="rowhead"><span class="eyebrow">Gerar para copiar e enviar</span></div><div class="actions"><button class="btn-accent" data-act="digest">TO DO do dia</button><button class="btn" data-act="statusSem">Status semanal</button><button class="btn" data-act="arquivar">Arquivar concluídas'+(nConc?' ('+nConc+')':"")+'</button></div>';
  if(ui.resumo)h+='<div class="resumo"><button class="copy" data-act="copy" data-target="resumoText">Copiar</button><textarea class="out" id="resumoText" readonly>'+esc(ui.resumo)+'</textarea></div>';
  else h+='<div class="hint">O TO DO do dia sai dividido por pessoa, com os clientes de cada uma dentro. O status semanal sai por cliente, para abrir a reunião.</div>';
  var arq=arquivadas().length;
  h+='<div class="foot">No histórico: '+arq+' frente(s) concluída(s). Veja a aba Histórico para relatórios individuais.</div>';
  return h+'</div>';
}

/* ===== Histórico & relatórios ===== */
var PERIODOS=[[7,"Semana"],[31,"Mês"],[183,"Semestre"],[0,"Tudo"]];
function histFiltradas(){
  return arquivadas().filter(function(f){
    if(ui.histDias&&!dentroDias(f.dataConclusao,ui.histDias))return false;
    if(ui.histPessoa&&respList(f).indexOf(ui.histPessoa)===-1)return false;
    return true;
  }).sort(function(a,b){return (b.dataConclusao||"").localeCompare(a.dataConclusao||"");});
}
function viewHist(){
  var list=histFiltradas();
  var pOpts='<option value="">Toda a equipe</option>'+pessoas().map(function(p){return '<option '+(ui.histPessoa===p?"selected":"")+'>'+esc(p)+'</option>';}).join("");
  var h='<div class="section"><div class="rowhead"><span class="eyebrow">Histórico de entregas · base dos relatórios</span></div>';
  h+='<div class="hist-controls"><div class="fchips">'+PERIODOS.map(function(pd){
    return '<button class="chip '+(ui.histDias===pd[0]?"active":"")+'" data-act="histDias" data-d="'+pd[0]+'">'+pd[1]+'</button>';
  }).join("")+'</div><select class="input hist-pessoa" id="histPessoa">'+pOpts+'</select><button class="btn-accent" data-act="gerarRel">Gerar relatório</button></div>';
  if(ui.relatorio)h+='<div class="resumo"><button class="copy" data-act="copy" data-target="relText">Copiar</button><textarea class="out" id="relText" readonly>'+esc(ui.relatorio)+'</textarea></div>';
  if(!list.length)h+='<div class="empty">Nenhuma entrega no período. As frentes chegam aqui quando são aprovadas por Dani, Helder ou Adriano.</div>';
  list.forEach(function(f){
    var link=f.resultado&&f.resultado.link?'<a class="res-link" href="'+esc(f.resultado.link)+'" target="_blank" rel="noopener">'+LINKI+' resultado</a>':'<span class="res-miss">sem link</span>';
    var apr=f.aprovadoPor?'aprovada por '+esc(f.aprovadoPor):'sem registro de aprovação';
    h+='<div class="hist-item"><div class="hist-main"><div class="frente-cli">'+esc(f.cliente)+'</div><div class="frente-dem">'+esc(f.demanda)+'</div><div class="hist-meta">'+esc(f.responsavel)+' · concluída em '+fmtBRfull(f.dataConclusao)+' · '+apr+'</div></div><div class="hist-side">'+link+'</div></div>';
  });
  h+='<div class="foot">Regra da casa: uma frente só entra aqui depois do link do resultado e do aceite de um gestor. O ciclo (dias entre abertura e conclusão) é medido nas frentes criadas pelo app.</div>';
  return h+'</div>';
}
function gerarRelatorio(){
  var list=histFiltradas();
  var quem=ui.histPessoa||"Equipe";
  var per=PERIODOS.filter(function(p){return p[0]===ui.histDias;})[0][1].toLowerCase();
  var t="RELATÓRIO DE ENTREGAS · "+quem+" · período: "+per+" · gerado em "+hojeBR()+"\n\n";
  if(!list.length){ui.relatorio=t+"Nenhuma entrega registrada no período.";return;}
  var comLink=list.filter(function(f){return f.resultado&&f.resultado.link;}).length;
  var ciclos=list.filter(function(f){return f.criadaEm&&f.dataConclusao;}).map(function(f){return diasEntre(f.criadaEm,f.dataConclusao);});
  var cicloMed=ciclos.length?Math.round(ciclos.reduce(function(a,b){return a+b;},0)/ciclos.length*10)/10:null;
  t+="Panorama: "+list.length+" entrega(s) · "+comLink+" com resultado comprovado por link ("+Math.round(comLink/list.length*100)+"%)";
  t+=cicloMed!==null?" · ciclo médio de "+cicloMed+" dia(s) nas "+ciclos.length+" frentes com data de abertura\n":" · ciclo médio ainda sem base (frentes migradas não têm data de abertura)\n";
  var byC={};list.forEach(function(f){byC[f.cliente]=(byC[f.cliente]||0)+1;});
  t+="\nPOR CLIENTE\n";
  Object.keys(byC).sort(function(a,b){return byC[b]-byC[a];}).forEach(function(c){t+="- "+c+": "+byC[c]+"\n";});
  if(!ui.histPessoa){
    var byP={};list.forEach(function(f){respList(f).forEach(function(p){byP[p]=(byP[p]||0)+1;});});
    t+="\nPOR PESSOA\n";
    Object.keys(byP).sort(function(a,b){return byP[b]-byP[a];}).forEach(function(p){t+="- "+p+": "+byP[p]+"\n";});
  }
  var byG={};list.forEach(function(f){var g=f.aprovadoPor||"sem registro";byG[g]=(byG[g]||0)+1;});
  t+="\nAPROVAÇÕES\n";
  Object.keys(byG).sort().forEach(function(g){t+="- "+g+": "+byG[g]+"\n";});
  t+="\nENTREGAS\n";
  list.forEach(function(f){
    t+="- "+fmtBR(f.dataConclusao)+" · "+f.cliente+": "+f.demanda+" ("+f.responsavel+")"+(f.resultado&&f.resultado.link?" · "+f.resultado.link:"")+"\n";
  });
  ui.relatorio=t;
}

/* ===== radar / tabs / render ===== */
function renderRadar(){
  var ab=abertas();
  var venc=ab.filter(function(f){return overdue(f.prazo);}).length;
  var esp=ab.filter(isWaiting).length;
  var apr=emAprovacao().length;
  document.getElementById("radar").innerHTML='<div class="r"><span class="r-n">'+ab.length+'</span><span class="r-l">abertas</span></div><div class="r r-late"><span class="r-n">'+venc+'</span><span class="r-l">vencidas</span></div><div class="r r-wait"><span class="r-n">'+esp+'</span><span class="r-l">aguardando</span></div><div class="r r-apr"><span class="r-n">'+apr+'</span><span class="r-l">aprovação</span></div>';
}
function renderTabs(){
  var tabs=[["hoje","Hoje"],["clientes","Clientes"],["pautas","Pautas"],["hist","Histórico"],["resumos","Resumos"]];
  document.getElementById("tabs").innerHTML=tabs.map(function(t){return '<button class="tab '+(ui.tab===t[0]?"tab-on":"")+'" data-act="tab" data-tab="'+t[0]+'">'+t[1]+'</button>';}).join("");
}
function render(){
  renderRadar();renderTabs();

  if(ui.tab==="hist"){var sp=document.getElementById("histPessoa");if(sp)sp.onchange=function(e){ui.histPessoa=e.target.value;ui.relatorio="";render();};}
}
function refresh(){render();if(ui.drawerId)renderDrawer();}

/* ===== geradores ===== */
function gerarDigest(){
  var ab=abertas();
  var venc=ab.filter(function(f){return overdue(f.prazo);});
  var esp=ab.filter(isWaiting);
  var apr=emAprovacao();
  var paradas=pautas.filter(function(p){return proxima(p);});
  var t="TO DO · "+hojeBR()+"\n\n";
  t+="Panorama: "+ab.length+" frentes abertas · "+venc.length+" vencidas · "+esp.length+" aguardando ou travadas · "+apr.length+" esperando aprovação\n";
  var at=ab.filter(function(f){return overdue(f.prazo)||isWaiting(f);});
  if(at.length){t+="\nPRECISA DE ATENÇÃO\n";at.forEach(function(f){var tag=f.status==="Travado"?"travado":(f.status.indexOf("Aguardando")===0?"aguardando":"prazo "+fmtBR(f.prazo)+" vencido");t+="- "+f.cliente+": "+f.demanda+" ("+f.responsavel+" · "+tag+")\n";});}
  if(apr.length){t+="\nPARA O GESTOR APROVAR (Dani, Helder ou Adriano)\n";apr.forEach(function(f){t+="- "+f.cliente+": "+f.demanda+" ("+f.responsavel+")"+(f.resultado&&f.resultado.link?" · "+f.resultado.link:" · sem link")+"\n";});}
  if(paradas.length){t+="\nPAUTAS NO FUNIL (próximo passo)\n";paradas.forEach(function(p){t+="- "+p.cliente+": "+p.pauta+" -> "+proxima(p).label+"\n";});}
  t+="\nPOR PESSOA\n";
  var byP={};ab.forEach(function(f){respList(f).forEach(function(p){(byP[p]=byP[p]||[]).push(f);});});
  Object.keys(byP).sort().forEach(function(p){
    t+="\n"+p+"\n";
    var byC={};byP[p].forEach(function(f){(byC[f.cliente]=byC[f.cliente]||[]).push(f);});
    Object.keys(byC).sort().forEach(function(c){
      t+="  "+c+":\n";
      byC[c].forEach(function(f){t+="  - "+f.demanda+" · "+f.status+(f.prazo?" · "+fmtBR(f.prazo):"")+(overdue(f.prazo)?" (vencido)":"")+"\n";});
    });
  });
  ui.resumo=t;
}
function gerarStatus(){
  var ab=abertas();
  var t="STATUS SEMANAL · Núcleo Lilás · "+hojeBR()+"\n";
  var byC={};ab.forEach(function(f){(byC[f.cliente]=byC[f.cliente]||[]).push(f);});
  Object.keys(byC).sort().forEach(function(c){t+="\n"+c.toUpperCase()+"\n";byC[c].forEach(function(f){t+="- "+f.demanda+" · "+f.responsavel+" · "+f.status+(f.prazo?" · "+fmtBR(f.prazo):"")+"\n";});});
  var conc=arquivadas().filter(function(f){return dentroDias(f.dataConclusao,7);});
  if(conc.length){t+="\nCONCLUÍDAS NA SEMANA\n";conc.forEach(function(f){t+="- "+f.cliente+": "+f.demanda+" ("+f.responsavel+")"+(f.resultado&&f.resultado.link?" · "+f.resultado.link:"")+"\n";});}
  ui.resumo=t;
}
var toastT;function toast(m){var t=document.getElementById("toast");t.textContent=m;t.classList.add("on");clearTimeout(toastT);toastT=setTimeout(function(){t.classList.remove("on");},2600);}
function val(idv){var el=document.getElementById(idv);return el?el.value.trim():"";}

/* ===== eventos ===== */
document.body.addEventListener("click",function(e){
  var el=e.target.closest("[data-act]");if(!el)return;
  var act=el.dataset.act,id=+el.dataset.id;
  if(act==="tab"){ui.tab=el.dataset.tab;ui.openCmt=null;ui.concluirId=null;render();}
  else if(act==="fStatus"){var k=el.dataset.k||null;ui.fStatus=(ui.fStatus===k?null:k);render();}
  else if(act==="toggleForm"){ui.showForm=!ui.showForm;render();}
  else if(act==="cancelForm"){ui.showForm=false;render();}
  else if(act==="toggleFormP"){ui.showFormP=!ui.showFormP;render();}
  else if(act==="cancelFormP"){ui.showFormP=false;render();}
  else if(act==="addFrente"){
    var cliente=val("fCliente"),resp=val("fResp"),demanda=val("fDemanda"),status=val("fStatus"),prazo=val("fPrazo");
    if(!cliente||!resp||!demanda){toast("Preencha cliente, responsável e demanda");return;}
    var nid=Math.max(0,...frentes.map(function(f){return f.id;}))+1;
    frentes.unshift({id:nid,cliente:cliente,demanda:demanda,responsavel:resp,status:status,prazo:prazo,arquivada:false,dataConclusao:"",criadaEm:isoHoje(),comentarios:[],resultado:null,aprovadoPor:""});
    saveF();ui.showForm=false;render();toast("Frente adicionada");
  }
  else if(act==="addPauta"){
    var pcliente=val("pCliente"),presp=val("pResp"),ppauta=val("pPauta");
    if(!pcliente||!presp||!ppauta){toast("Preencha cliente, responsável e título");return;}
    var pid=Math.max(0,...pautas.map(function(p){return p.id;}))+1;
    pautas.unshift({id:pid,cliente:pcliente,pauta:ppauta,responsavel:presp,proc:procVazio()});
    saveP();ui.showFormP=false;render();toast("Pauta criada");
  }
  else if(act==="proc"){
    var step=el.dataset.step,v=el.dataset.val;
    pautas=pautas.map(function(p){if(p.id!==id)return p;var proc=Object.assign({},p.proc);if(v==="1")proc[step]=true;else if(v==="hoje")proc[step]=isoHoje();else proc[step]=v;return Object.assign({},p,{proc:proc});});
    saveP();refresh();
  }
  else if(act==="cmt"){ui.openCmt=(ui.openCmt===id?null:id);ui.concluirId=null;refresh();}
  else if(act==="addCmt"){
    var autor=val("cmtAutor"+id),txt=val("cmtTxt"+id);
    if(!autor||!txt){toast("Preencha quem comenta e o comentário");return;}
    frentes=frentes.map(function(f){if(f.id!==id)return f;var cs=f.comentarios.slice();cs.push({autor:autor,quando:isoHoje(),txt:txt});return Object.assign({},f,{comentarios:cs});});
    saveF();refresh();toast("Comentário registrado");
  }
  else if(act==="concluir"){ui.concluirId=id;ui.openCmt=null;refresh();}
  else if(act==="cancelConcluir"){ui.concluirId=null;refresh();}
  else if(act==="enviarAprov"){
    var link=val("resLink"+id),nota=val("resNota"+id);
    if(!link){toast("O link do resultado é obrigatório para concluir");return;}
    frentes=frentes.map(function(f){return f.id===id?Object.assign({},f,{status:"Em aprovação",resultado:{link:link,nota:nota,em:isoHoje()}}):f;});
    saveF();ui.concluirId=null;refresh();toast("Enviada para aprovação do gestor");
  }
  else if(act==="aprovar"){
    var gestor=val("gestor"+id)||GESTORES[0];
    frentes=frentes.map(function(f){return f.id===id?Object.assign({},f,{status:"Concluído",aprovadoPor:gestor,dataConclusao:isoHoje(),arquivada:true}):f;});
    saveF();refresh();toast("Aprovada por "+gestor+" e movida para o Histórico");
  }
  else if(act==="devolver"){
    var gestor2=val("gestor"+id)||GESTORES[0];
    frentes=frentes.map(function(f){
      if(f.id!==id)return f;
      var cs=f.comentarios.slice();cs.push({autor:gestor2,quando:isoHoje(),txt:"Devolvida na aprovação. Ajustar e reenviar."});
      return Object.assign({},f,{status:"Em andamento",comentarios:cs});
    });
    saveF();refresh();toast("Devolvida para ajuste");
  }
  else if(act==="arquivar"){
    var n=frentes.filter(function(f){return !f.arquivada&&f.status==="Concluído";}).length;
    frentes=frentes.map(function(f){return(!f.arquivada&&f.status==="Concluído")?Object.assign({},f,{arquivada:true,dataConclusao:f.dataConclusao||isoHoje()}):f;});
    saveF();refresh();toast(n?n+" frente(s) movida(s) para o Histórico":"Nada concluído para arquivar");
  }
  else if(act==="digest"){gerarDigest();render();}
  else if(act==="statusSem"){gerarStatus();render();}
  else if(act==="copy"){var ta=document.getElementById(el.dataset.target||"resumoText");if(ta){navigator.clipboard.writeText(ta.value).then(function(){toast("Copiado");}).catch(function(){ta.select();toast("Selecionado, use copiar");});}}
  else if(act==="openCli"){openDrawer(el.dataset.cli,el.dataset.dtab);}
  else if(act==="closeDrawer"){closeDrawer();}
  else if(act==="dtab"){ui.drawerTab=el.dataset.dtab;ui.showAddF=false;ui.showAddP=false;renderDrawer();}
  else if(act==="cliTag"){var tg=el.dataset.tag;ui.tag=(ui.tag===tg?null:tg);renderCliTags();renderCliGrid();}
  else if(act==="cliPend"){ui.pend=!ui.pend;el.classList.toggle("on",ui.pend);renderCliGrid();}
  else if(act==="cliClear"){ui.q="";ui.tag=null;ui.pend=false;render();}
  else if(act==="histDias"){ui.histDias=+el.dataset.d;ui.relatorio="";render();}
  else if(act==="gerarRel"){gerarRelatorio();render();}
  else if(act==="toggleAddF"){ui.showAddF=true;renderDrawer();}
  else if(act==="cancelAddF"){ui.showAddF=false;renderDrawer();}
  else if(act==="toggleAddP"){ui.showAddP=true;renderDrawer();}
  else if(act==="cancelAddP"){ui.showAddP=false;renderDrawer();}
  else if(act==="addFrenteCli"){
    var c=clientById(ui.drawerId);if(!c)return;
    var resp2=val("fdResp"),dem2=val("fdDemanda"),st2=val("fdStatus"),pz2=val("fdPrazo");
    if(!resp2||!dem2){toast("Preencha responsável e demanda");return;}
    var nid2=Math.max(0,...frentes.map(function(f){return f.id;}))+1;
    frentes.unshift({id:nid2,cliente:c.nome,demanda:dem2,responsavel:resp2,status:st2,prazo:pz2,arquivada:false,dataConclusao:"",criadaEm:isoHoje(),comentarios:[],resultado:null,aprovadoPor:""});
    saveF();ui.showAddF=false;refresh();toast("Frente adicionada");
  }
  else if(act==="addPautaCli"){
    var c2=clientById(ui.drawerId);if(!c2)return;
    var presp2=val("pdResp"),ppauta2=val("pdPauta");
    if(!presp2||!ppauta2){toast("Preencha responsável e título");return;}
    var pid2=Math.max(0,...pautas.map(function(p){return p.id;}))+1;
    pautas.unshift({id:pid2,cliente:c2.nome,pauta:ppauta2,responsavel:presp2,proc:procVazio()});
    saveP();ui.showAddP=false;refresh();toast("Pauta criada");
  }
  else if(act==="saveNota"){
    var c3=clientById(ui.drawerId);if(!c3)return;
    var v3=document.getElementById("notaTxt").value;
    if(v3&&v3.trim())notes[c3.id]=v3;else delete notes[c3.id];
    saveN();
    var sv=document.getElementById("notaSaved");if(sv){sv.classList.add("show");setTimeout(function(){sv.classList.remove("show");},1800);}
    if(ui.tab==="clientes")renderCliGrid();
  }
});
document.body.addEventListener("change",function(e){
  var el=e.target.closest("[data-act]");if(!el)return;
  var act=el.dataset.act,id=+el.dataset.id;
  if(act==="status"){frentes=frentes.map(function(f){return f.id===id?Object.assign({},f,{status:el.value}):f;});saveF();refresh();}
  else if(act==="exclusiva"){pautas=pautas.map(function(p){return p.id===id?Object.assign({},p,{proc:Object.assign({},p.proc,{exclusiva:el.value})}):p;});saveP();}
});
document.getElementById("scrim").addEventListener("click",closeDrawer);
document.addEventListener("keydown",function(e){
  if(e.key==="Escape"&&ui.drawerId){closeDrawer();return;}
  if((e.key==="Enter"||e.key===" ")&&e.target&&e.target.classList&&e.target.classList.contains("ccard")){e.preventDefault();openDrawer(e.target.dataset.cli);}
});

render();

</script>
</body>
</html>
